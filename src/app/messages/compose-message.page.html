<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/messages"></ion-back-button>
    </ion-buttons>
    <ion-title>Messages</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="compose-content">
  <div class="compose-wrapper">
    <form [formGroup]="form" (ngSubmit)="send()" class="compose-form">
      <div class="form-group">
        <ion-label>To</ion-label>
        <ion-item lines="none" class="form-input">
          <ion-select formControlName="to" placeholder="Select recipient" interface="action-sheet">
            <ion-select-option value="estate">Estate Management</ion-select-option>
            <ion-select-option *ngFor="let n of neighbors" [value]="n.id">
              {{ n.fullName }}
            </ion-select-option>
          </ion-select>
        </ion-item>
      </div>

      <div class="form-group">
        <ion-label>Subject</ion-label>
        <ion-item lines="none" class="form-input">
          <ion-input formControlName="subject" placeholder="Subject"></ion-input>
        </ion-item>
      </div>

      <div class="form-group">
        <ion-label>Message</ion-label>
        <ion-item lines="none" class="form-input form-textarea">
          <ion-textarea formControlName="message" placeholder="Compose your message" rows="6"></ion-textarea>
        </ion-item>
      </div>

      <ion-button expand="block" type="submit" class="send-btn">
        <ion-icon name="send-outline"></ion-icon>
        Send
      </ion-button>
    </form>
  </div>

  <!-- Bottom nav -->
  <div class="bottom-nav">
    <a routerLink="/home" class="nav-item nav-active">
      <ion-icon name="home"></ion-icon>
      <span>Home</span>
    </a>
    <button type="button" class="nav-center-btn" (click)="onCenterAction()" aria-label="Main action">
      <ion-icon name="close"></ion-icon>
    </button>
    <a routerLink="/profile" class="nav-item">
      <ion-icon name="person-outline"></ion-icon>
      <span>Profile</span>
    </a>
  </div>
</ion-content>
