<ion-header>
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/profile"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="profile-id-content">
  <div class="profile-id-wrapper">
    <div class="qr-section">
      <img [src]="qrCodeUrl" [alt]="'QR code for ' + userName" class="qr-code" />
      <h1 class="profile-id-name">{{ userName }}</h1>
      <span class="profile-id-number">{{ userId }}</span>
    </div>
    <button type="button" class="logout-btn" (click)="logout()">Logout</button>
  </div>

  <div class="bottom-nav">
    <a routerLink="/home" class="nav-item">
      <ion-icon name="home-outline"></ion-icon>
      <span>Home</span>
    </a>
    <button type="button" class="nav-center-btn" (click)="onCenterAction()" aria-label="Main action">
      <ion-icon name="close"></ion-icon>
    </button>
    <a routerLink="/profile" class="nav-item">
      <ion-icon name="person-outline"></ion-icon>
      <span>Profile</span>
    </a>
  </div>
</ion-content>
